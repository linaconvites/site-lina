<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Super Breno</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; display: flex; justify-content: center; align-items: center; }
        
        #main-container { width: 1080px; height: 1920px; position: relative; transform-origin: center center; flex-shrink: 0; }
        .screen { position: absolute; inset: 0; width: 100%; height: 100%; display: none; }

        /* CAPA */
        #screen-capa { z-index: 100; cursor: pointer; display: block; }
        #screen-capa img { width: 100%; height: 100%; object-fit: cover; }
        #capa-hint {
            position: absolute; bottom: 150px; left: 50%;
            transform: translateX(-50%); color: #fff;
            font-family: 'Cinzel Decorative', cursive; font-size: 35px;
            text-shadow: 2px 2px 10px #000;
            animation: pulse 1.5s infinite; white-space: nowrap;
        }

        /* VIDEO */
        #screen-video { z-index: 200; background: #000; }
        #video-main { width: 100%; height: 100%; object-fit: cover; }

        /* CONVITE */
        #screen-convite { z-index: 300; }
        .bg-convite { width: 100%; height: 100%; object-fit: cover; }

        /* BOTÃO MÚSICA */
        #btn-music {
            position: absolute; top: 40px; left: 40px; z-index: 400;
            background: rgba(255, 255, 255, 0.3); border: none;
            width: 80px; height: 80px; cursor: pointer; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px);
        }
        .icon-pause div { width: 8px; height: 35px; background: #fff; margin: 0 4px; border-radius: 2px; }
        .icon-play { border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-left: 25px solid #fff; margin-left: 8px; }

        /* BOTÕES DE INTERAÇÃO */
        .invite-btn { position: absolute; background: rgba(255,0,0,0); border: none; cursor: pointer; }

        /* MODAL PRESENTES */
        .modal-overlay {
            position: absolute; inset: 0; z-index: 500;
            display: none; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
        }
        .modal-overlay.open { display: flex; }
        .modal-box { position: relative; width: 85%; }
        .modal-box img { width: 100%; border-radius: 15px; border: 5px solid #fff; }
        .modal-close {
            position: absolute; top: -20px; right: -20px;
            width: 70px; height: 70px; background: #e52521; color: #fff;
            border-radius: 50%; font-size: 35px; border: 3px solid #fff; font-weight: bold;
        }

        #pix-toast {
            position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: #fbd000; color: #000; padding: 20px 50px; border-radius: 50px;
            font-family: 'Cinzel Decorative', cursive; font-size: 30px; font-weight: bold;
            z-index: 1000; opacity: 0; transition: 0.4s; border: 3px solid #000;
        }
        #pix-toast.show { opacity: 1; }

        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
    </style>
</head>
<body>

<audio id="audio-bg" loop>
    <source src="musicamario.mp3" type="audio/mpeg">
</audio>

<div id="main-container">

    <div id="screen-capa" class="screen" onclick="iniciar()">
        <img src="https://i.ibb.co/jk5vYR86/envelope.jpg" alt="Capa Mario">
        <div id="capa-hint">✦ TOQUE PARA JOGAR ✦</div>
    </div>

    <div id="screen-video" class="screen">
        <video id="video-main" playsinline webkit-playsinline muted>
            <source src="https://res.cloudinary.com/dltj3jhe6/video/upload/q_auto/f_auto/v1778272343/videomario_fr6rnc.mp4">
        </video>
    </div>

    <div id="screen-convite" class="screen">
        <img class="bg-convite" src="https://i.ibb.co/6R6hLH9T/convite.jpg" alt="Convite Mario">
        
        <button id="btn-music" onclick="toggleMusica()">
            <div id="music-icon" class="icon-pause"><div style="display:inline-block"></div><div style="display:inline-block"></div></div>
        </button>

        <button class="invite-btn" onclick="abrirLink('https://share.google/y2jI6eJcC5RvhRK50')" style="left:24.3%; top:51.5%; width:26.1%; height:14.7%;"></button>
        
        <button class="invite-btn" onclick="abrirLink('https://wa.me/5511953520254?text=Confirmado!%20Let%27s%20Go!')" style="left:52.8%; top:51.5%; width:26.1%; height:14.7%;"></button>
        
        <button class="invite-btn" onclick="abrirModal('modal-presentes')" style="left:39.8%; top:66.5%; width:26.1%; height:14.7%;"></button>
    </div>

    <div class="modal-overlay" id="modal-presentes">
        <div class="modal-box">
            <button class="modal-close" onclick="fecharModais()">✕</button>
            <img src="https://i.ibb.co/5W43QSg0/presentes.jpg">
            <button onclick="copiarPix('11953520254')" style="position:absolute; left:25%; bottom:15%; width:50%; height:20%; background:transparent; border:none;"></button>
        </div>
    </div>

    <div id="pix-toast">✓ PIX COPIADO!</div>

</div>

<script>
    const audio = document.getElementById('audio-bg');
    const video = document.getElementById('video-main');
    const container = document.getElementById('main-container');

    function ajustarTela() {
        const s = Math.min(window.innerWidth / 1080, window.innerHeight / 1920);
        container.style.transform = `scale(${s})`;
    }
    window.addEventListener('resize', ajustarTela);
    ajustarTela();

    function iniciar() {
        document.getElementById('screen-capa').style.display = 'none';
        document.getElementById('screen-video').style.display = 'block';
        audio.play().catch(e => console.log(e));
        video.play().catch(e => irParaConvite());
    }

    video.addEventListener('ended', irParaConvite);

    function irParaConvite() {
        video.pause();
        document.getElementById('screen-video').style.display = 'none';
        document.getElementById('screen-convite').style.display = 'block';
        if (audio.paused) audio.play();
    }

    function toggleMusica() {
        const icon = document.getElementById('music-icon');
        if (audio.paused) {
            audio.play();
            icon.className = 'icon-pause';
            icon.innerHTML = '<div style="display:inline-block"></div><div style="display:inline-block"></div>';
        } else {
            audio.pause();
            icon.className = 'icon-play';
            icon.innerHTML = '';
        }
    }

    function abrirLink(url) { window.location.href = url; }
    function abrirModal(id) { document.getElementById(id).classList.add('open'); }
    function fecharModais() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open')); }
    
    function copiarPix(chave) {
        navigator.clipboard.writeText(chave);
        const t = document.getElementById('pix-toast');
        t.classList.add('show');
        setTimeout(() => t.classList.remove('show'), 2500);
    }
</script>

</body>
</html>
